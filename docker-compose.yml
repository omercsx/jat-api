services:
  postgres:
    image: postgres:16-alpine
    container_name: jat_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jat_dev
      POSTGRES_USER: jat_user
      POSTGRES_PASSWORD: jat_local_dev
    ports:
      - '5433:5432'
    volumes:
      - jat_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jat_user -d jat_dev']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  jat_postgres_data:
